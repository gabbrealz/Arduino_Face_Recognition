<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Arduino Attendance Simulator</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>
body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.lcd{
width:340px;
margin:auto;
background:#2c3e2f;
color:#8aff8a;
padding:15px;
font-family:monospace;
font-size:22px;
letter-spacing:2px;
border-radius:6px;
}

.row{
height:30px;
}

.panel{
margin-top:30px;
}

button{
padding:15px 40px;
font-size:18px;
margin-top:20px;
cursor:pointer;
}

.led{
width:30px;
height:30px;
border-radius:50%;
display:inline-block;
margin:10px;
background:#333;
}

.green.on{background:#00ff55;}
.red.on{background:#ff3333;}

.status{
margin-top:20px;
font-size:18px;
}
</style>
</head>

<body>

<h2>Arduino R4 Attendance Simulator</h2>

<div class="lcd">
<div id="lcd0" class="row"></div>
<div id="lcd1" class="row"></div>
</div>

<div class="panel">
<div id="greenLed" class="led green"></div>
<div id="redLed" class="led red"></div>
</div>

<button id="button">PRESS BUTTON</button>

<div class="status">
MQTT: <span id="mqttStatus">Disconnected</span>
</div>

<script>

const broker="ws://localhost:9001"

const lcd0=document.getElementById("lcd0")
const lcd1=document.getElementById("lcd1")

const greenLed=document.getElementById("greenLed")
const redLed=document.getElementById("redLed")

const mqttStatus=document.getElementById("mqttStatus")

let requestSent=false
let lastRequestTimestamp=0
let loadingStep=0
let loadingTimestamp=0

function lcdClear(){
lcd0.textContent=""
lcd1.textContent=""
}

function lcdReset(){
lcdClear()
lcd0.textContent="   Attendance"
lcd1.textContent="  System Ready"
}

function lcdSuccess(msg){
lcdClear()
lcd0.textContent="    SUCCESS"
lcd1.textContent=msg
}

function lcdError(msg){
lcdClear()
lcd0.textContent="     ERROR"
lcd1.textContent=msg
}

function successTone(){

const ctx=new AudioContext()

let o=ctx.createOscillator()
o.frequency.value=1200
o.connect(ctx.destination)
o.start()
setTimeout(()=>o.stop(),150)

setTimeout(()=>{
let o2=ctx.createOscillator()
o2.frequency.value=1600
o2.connect(ctx.destination)
o2.start()
setTimeout(()=>o2.stop(),200)
},200)

}

function errorTone(){

const ctx=new AudioContext()

let o=ctx.createOscillator()
o.frequency.value=300
o.connect(ctx.destination)
o.start()
setTimeout(()=>o.stop(),400)

}

function green(on){
greenLed.classList.toggle("on",on)
}

function red(on){
redLed.classList.toggle("on",on)
}

function updateLoading(){

let now=Date.now()

if(now-loadingTimestamp<750) return

if(now-lastRequestTimestamp>=12000){
requestSent=false
lcdError("No response")

setTimeout(()=>{
lcdReset()
},5000)

return
}

if(loadingStep===0){
lcd0.textContent="Loading"
loadingStep++
}
else if(loadingStep<4){
lcd0.textContent+="."
loadingStep++
}
else{
loadingStep=0
}

loadingTimestamp=now

}

const client=mqtt.connect(broker)

client.on("connect",()=>{

mqttStatus.textContent="Connected"

client.subscribe("arduino-r4/input")

})

client.on("message",(topic,message)=>{

let payload

try{
payload=JSON.parse(message.toString())
}catch{
return
}

const req=payload.req
const msg=payload.msg

requestSent=false

if(req==="ATTND" || req==="RGSTR"){

if(payload.success){

lcdSuccess(msg)

green(true)
successTone()

setTimeout(()=>{
green(false)
lcdReset()
},5000)

}
else{

lcdError(msg)

red(true)
errorTone()

setTimeout(()=>{
red(false)
lcdReset()
},5000)

}

}

})

document.getElementById("button").onclick=()=>{

let now=Date.now()

if(requestSent) return

if(now-lastRequestTimestamp<3000) return

client.publish("arduino-r4/output","CLICK")

requestSent=true
lastRequestTimestamp=now
loadingStep=0

lcdClear()

}

setInterval(()=>{

if(requestSent){
updateLoading()
}

},100)

lcdReset()

</script>

</body>
</html>
